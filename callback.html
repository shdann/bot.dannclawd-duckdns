<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #161b22;
        }
        .container {
            background: #21262d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #30363d;
        }
        h1 {
            color: #f0f6fc;
            margin-bottom: 20px;
        }
        .success {
            color: #238636;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .token {
            background: #0d1117;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 20px 0;
        }
        .info {
            color: #8b949e;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
        }
        .btn:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✓</div>
        <h1>Authorization Successful</h1>
        <p class="info">You have authorized the AUE-DB bot.</p>
        <p>Authorized as: <span id="username">Loading...</span></p>
        <p>Your GitHub OAuth code/token:</p>
        <div class="token" id="token">Loading...</div>
        <a href="https://audb.duckdns.org/" class="btn">Go to AUE-DB</a>
    </div>

    <script>
        // Extract the 'code' parameter from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        if (code) {
            // Extract username from state if available
            if (state) {
                try {
                    const stateObj = JSON.parse(atob(state));
                    document.getElementById('username').textContent = stateObj.username || 'User';
                } catch (e) {
                    document.getElementById('username').textContent = 'User';
                }
            } else {
                document.getElementById('username').textContent = 'User';
            }

            // Display the code/token
            document.getElementById('token').textContent = code;

            // Optionally send to your backend via fetch
            // fetch('https://audb.duckdns.org/api/auth/github/callback', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ code: code, state: state })
            // });
        } else {
            document.getElementById('token').textContent = 'No authorization code found in URL';
        }
    </script>
</body>
</html>
